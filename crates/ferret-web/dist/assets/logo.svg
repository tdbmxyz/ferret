<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- C: "Signal" — abstract: ferret ear-tips as a chart line dropping into
       a caught deal point. UI-palette, most abstract of the three. -->
  <rect width="128" height="128" rx="28" fill="#14161c"/>
  <!-- falling price line -->
  <path d="M20 36 L44 52 L60 44 L84 76 L98 68"
        fill="none" stroke="#8a90a0" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- the caught deal -->
  <circle cx="98" cy="68" r="12" fill="#7c9aff"/>
  <circle cx="98" cy="68" r="5" fill="#14161c"/>
  <!-- ferret peeking from the bottom edge -->
  <path d="M28 128 C28 106 48 96 64 100 C80 104 88 116 88 128 Z" fill="#e8e2d4"/>
  <path d="M34 112 C46 106 74 106 84 112 L84 120 C70 126 46 126 34 120 Z" fill="#2a2e3a"/>
  <circle cx="48" cy="116" r="4.5" fill="#7c9aff"/>
  <circle cx="72" cy="116" r="4.5" fill="#7c9aff"/>
  <circle cx="40" cy="102" r="6" fill="#b9a88f"/>
  <circle cx="80" cy="102" r="6" fill="#b9a88f"/>
</svg>
