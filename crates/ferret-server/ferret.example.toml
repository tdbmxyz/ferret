# Example ferret server configuration.
# Copy to ferret.toml (or point FERRET_CONFIG at it) and adjust.
# On NixOS this file is generated by the services.ferret module.

listen = "0.0.0.0:4800"
db_path = "ferret.db"

[scrape]
outlier_ratio = 0.5          # price < 0.5 × rolling median → price-outlier flag
stuffing_threshold = 0.25    # stuffing score ≥ 0.25 → possible-stuffing flag
failure_alert_after = 5      # consecutive source failures before an ntfy alert
renotify_drop_pct = 5.0      # re-notify a known match when its price drops ≥ 5%

# ---- declarative sources (generic scraper engine) ----
# One entry per static-HTML source. JS-heavy or authenticated sources are
# hand-written DealSource plugins instead (not yet implemented).

[[sources]]
id = "example-board"
# {page} → page number; {query} → each `queries` entry (url-encoded).
# Without `queries` the URL is a fixed listing page fetched once per tick;
# with `queries` the source is searched once per query (marketplace pattern).
url = "https://deals.example.com/hardware?page={page}"
# queries = ["rtx 3080", "ironwolf 4tb"]
item_selector = "div.listing"
title_selector = "h2.title"
price_selector = "span.price"
link_selector = "a.listing-link"
interval_minutes = 30
delay_ms = 2000              # politeness: min delay between requests
max_concurrency = 1          # politeness: concurrent requests cap
max_pages = 3

# ---- Leboncoin (hand-written plugin) ----
# Searches Leboncoin and parses the embedded __NEXT_DATA__ JSON. Behind
# DataDome: the fetch falls back to curl automatically when the plain HTTP
# client is fingerprint-blocked (403/429). Off by default.
# [leboncoin]
# enabled = true
# queries = ["rtx 3080", "seagate ironwolf 4to"]
# pages_per_query = 2       # 35 ads per page
# delay_ms = 2000           # politeness between requests
# interval_minutes = 30

# ---- Shopify official stores (the NEW market) ----
# Public /products.json catalogs — structured JSON, no anti-bot. One entry
# per store; one listing per available variant.
# [[shopify]]
# id = "minisforum-eu"
# url = "https://store.minisforum.de"
# currency = "EUR"
# interval_minutes = 360    # catalogs move slowly
# delay_ms = 1000

# ---- eBay.fr (hand-written plugin) ----
# One search page per query, s-card layout. eBay limits the IP after ~10
# rapid requests: keep delay_ms large; 403/429 retries once after 120 s.
# eBay fingerprint-blocks plain HTTP clients AND curl (verified 2026-07-17):
# in practice you need fetch_command pointing at a stealth browser wrapper —
# see scripts/stealth-fetch.py (Scrapling, same stack as ent/veille-prix).
# [ebay]
# enabled = true
# queries = ["rtx 3080"]
# delay_ms = 30000
# interval_minutes = 60
# fetch_command = ["/var/lib/ferret/.venv/bin/python", "/var/lib/ferret/stealth-fetch.py", "{url}"]

# ---- product family tables ----
# Sibling-model lists drive stuffing detection and per-model price history.
# Adding a generation is a config change, never a code change.

[[families]]
name = "nvidia-rtx"
models = ["2060", "2070", "2080", "3060", "3070", "3080", "3090", "4060", "4070", "4080", "4090", "5080", "5090"]
# without one of these words next to it, a bare model number is ignored
# ("Dell Optiplex 3080" is a PC, not a GPU)
context = ["rtx", "geforce", "nvidia", "gpu", "carte graphique"]

[[families]]
name = "ddr4-kit"
models = ["8GB", "16GB", "32GB", "64GB"]
context = ["ddr4", "ram", "dimm", "sodimm", "mémoire"]

# ---- LLM refinement (optional) ----
# One structured-output call per AMBIGUOUS listing (several sibling models
# in the title, or a price-outlier flag) refining attributes and adding a
# genuine / stuffed-title / scam verdict next to the heuristic flags.
# Fail-open: LLM errors keep the heuristic-only verdict. Off by default.
# [llm]
# enabled = true
# base_url = "http://zeus:8080/v1"   # any OpenAI-compatible API (llama-cpp)
# model = "local"
# api_key_file = "/run/agenix/ferret-llm-key"   # external backends only
# timeout_secs = 30

# ---- notifications ----
# Push via ntfy; omit the section (or leave ntfy_url unset) to disable.
# [notifications]
# ntfy_url = "https://notify.zeus.balem.fr"
# topic = "deals-zeus"
# token_file = "/run/agenix/ferret-ntfy-token"
